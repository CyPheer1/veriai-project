spring.application.name=backend-java
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/veriai}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:veriai_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:veriai_dev_password}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,prometheus}
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.jwt.secret=${JWT_SECRET:change-me-super-long-random-jwt-secret}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.quota.free-daily-limit=${FREE_PLAN_DAILY_LIMIT:3}
app.ai-service.base-url=${AI_SERVICE_BASE_URL:http://localhost:8000}
app.ai-service.enqueue-path=${AI_SERVICE_ENQUEUE_PATH:/internal/v1/analyze}
app.internal.service-token=${INTERNAL_SERVICE_TOKEN:change-me-internal-token}

logging.level.org.springframework.security=INFO
logging.level.com.example.backendjava=INFO
